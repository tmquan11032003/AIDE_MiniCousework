# Local lakehouse skeleton (Section 02 / M3): MinIO + Iceberg REST catalog + Spark.
# Service names (spark-iceberg, rest, minio) match the spark-defaults baked into the
# tabulario/spark-iceberg image (catalog `demo` -> http://rest:8181, S3 -> http://minio:9000).
# Kafka + Flink are added in M4.

name: coffee-lakehouse

services:
  spark-iceberg:
    image: ${SPARK_ICEBERG_IMAGE}
    container_name: spark-iceberg
    depends_on:
      rest:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
    volumes:
      - ../:/workspace # project root (access data/, scripts)
    ports:
      - "8888:8888" # Jupyter
      - "8080:8080" # Spark UI
    networks: [lakehouse]

  rest:
    image: ${ICEBERG_REST_IMAGE}
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - CATALOG_WAREHOUSE=s3://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
      - CATALOG_S3_PATH__STYLE__ACCESS=true
    networks: [lakehouse]

  minio:
    image: ${MINIO_IMAGE}
    container_name: minio
    environment:
      - MINIO_ROOT_USER=${AWS_ACCESS_KEY_ID}
      - MINIO_ROOT_PASSWORD=${AWS_SECRET_ACCESS_KEY}
      - MINIO_DOMAIN=minio
    volumes:
      - ${HOST_DATA_DIR}/minio:/data # persist on /home (not /)
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      lakehouse:
        aliases:
          - warehouse.minio # virtual-hosted-style bucket access

  # One-shot: create the `warehouse` bucket then idle.
  mc:
    image: ${MC_IMAGE}
    container_name: mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
    entrypoint: >
      /bin/sh -c "
      until (mc alias set minio http://minio:9000 ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY}) do echo '...waiting for minio...' && sleep 1; done;
      mc mb --ignore-existing minio/warehouse;
      mc anonymous set public minio/warehouse;
      echo 'bucket warehouse ready';
      tail -f /dev/null
      "
    networks: [lakehouse]

  # Kafka single-node in KRaft mode (no ZooKeeper). M4: streaming ingest.
  # In-network clients use kafka:9092; host clients (producer) use localhost:29092.
  kafka:
    image: ${KAFKA_IMAGE}
    container_name: kafka
    profiles: ["stream"]
    ports:
      - "29092:29092" # host access
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms256m
    volumes:
      - ${HOST_DATA_DIR}/kafka:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
    networks: [lakehouse]

  # Flink (JobManager + TaskManager) — streaming engine. M4: Kafka -> Bronze Iceberg.
  # Image built locally with Iceberg + Kafka + S3 jars (see flink/Dockerfile).
  flink-jobmanager:
    build:
      context: ./flink
    image: coffee-flink:1.19.1
    container_name: flink-jobmanager
    profiles: ["stream"]
    command: jobmanager
    ports:
      - "8081:8081" # Flink web UI
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        state.backend: hashmap
        execution.checkpointing.interval: 10s
        execution.checkpointing.savepoint-dir: file:///tmp/flink-cp
        taskmanager.numberOfTaskSlots: 2
    networks: [lakehouse]

  flink-taskmanager:
    image: coffee-flink:1.19.1
    container_name: flink-taskmanager
    profiles: ["stream"]
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        taskmanager.memory.process.size: 1536m
    networks: [lakehouse]

  # --- Orchestration (M7): Airflow LocalExecutor + Postgres. Profile "orchestration". ---
  airflow-postgres:
    image: postgres:15-alpine
    container_name: airflow-postgres
    profiles: ["orchestration"]
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - ${HOST_DATA_DIR}/airflow-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [lakehouse]

  airflow:
    build:
      context: ../airflow
    image: coffee-airflow:2.10.4
    container_name: airflow
    profiles: ["orchestration"]
    command: standalone
    depends_on:
      airflow-postgres:
        condition: service_healthy
    # Access the host docker socket (gid 984) to run `docker exec spark-iceberg ...`.
    group_add: ["984"]
    user: "50000:0"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    ports:
      - "8082:8080" # Airflow web UI (8080/8081 đã dùng cho Spark/Flink)
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [lakehouse]

networks:
  lakehouse:
